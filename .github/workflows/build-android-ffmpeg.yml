name: Build for Android FFmpeg
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
    - uses: actions/checkout@v6

    - name: Set env
      run: if grep -Fxq "devel" version.txt;then echo "GO2TV_VERSION=$(cat version.txt)";else echo "GO2TV_VERSION=v$(cat version.txt)";fi  >> $GITHUB_ENV

    - uses: actions/setup-go@v6
      with:
        go-version: 'stable'

    - name: Install fyne
      run: go install github.com/alexballas/refyne/v2/cmd/fyne@latest

    - name: Download Android SDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
        unzip android-ndk-r27d-linux.zip

    - name: Package (Android FFmpeg)
      run: |
        # Resolve the absolute path for the NDK
        APATH=$(readlink -f android-ndk-r27d)

        # Keep Go code version parity with the existing Android workflow.
        sed -i "s/version      = \"dev\"/version      = \"$(echo ${{ env.GO2TV_VERSION }} | sed 's/^v//')\"/" cmd/go2tv/go2tv.go

        ANDROID_NDK_HOME=$APATH make android-ffmpeg

    - uses: actions/upload-artifact@v6
      with:
        name: go2tv_${{ env.GO2TV_VERSION }}_android_ffmpeg
        path: |
          LICENSE
          README.md
          build/Go2TV-ffmpeg.apk
        retention-days: 2
